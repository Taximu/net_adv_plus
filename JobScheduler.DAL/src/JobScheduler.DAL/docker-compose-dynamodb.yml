# DynamoDB Local + web admin for UC 2.1 development.
# See: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/DynamoDBLocal.DownloadingAndRunning.html

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    # Match AWS sample: working_dir + -jar ... -sharedDb ensures one DB file for all access keys/regions
    working_dir: /home/dynamodblocal
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data -disableTelemetry"
    ports:
      - "8000:8000"
    volumes:
      - ./dynamodb-data:/home/dynamodblocal/data
    restart: unless-stopped
    networks:
      - job-scheduler-net

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      # Admin uses AWS SDK; dummy values are fine for DynamoDB Local
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
    depends_on:
      - dynamodb-local
    restart: unless-stopped
    networks:
      - job-scheduler-net

networks:
  job-scheduler-net:
    driver: bridge
