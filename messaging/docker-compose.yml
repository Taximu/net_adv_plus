# Start:  docker compose up -d
# UI:    http://localhost:8888  (Redpanda Console)
# Kafka: localhost:19092 (PLAINTEXT; use for .NET clients / rpk from host)


name: jobscheduler-messaging

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.11
    hostname: redpanda
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --smp
      - "1"
      - --memory
      - 768M
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "19644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - js_messaging_net
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers 127.0.0.1:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  topic-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.11
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - js_messaging_net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        rpk topic create job.catalog.events --brokers redpanda:9092 --partitions 6 --replicas 1 -c retention.ms=604800000 2>/dev/null || true
        rpk topic create execution.lifecycle --brokers redpanda:9092 --partitions 6 --replicas 1 -c retention.ms=604800000 2>/dev/null || true
        rpk topic list --brokers redpanda:9092
    restart: "no"

  console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    volumes:
      - ./redpanda-console-config.yml:/tmp/config.yml:ro
    ports:
      - "8888:8080"
    networks:
      - js_messaging_net

networks:
  js_messaging_net:
    driver: bridge

volumes:
  redpanda_data:
