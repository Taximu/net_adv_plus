global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts/jobscheduler.yml"

scrape_configs:
  - job_name: jobscheduler-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: jobscheduler-orchestrator
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator:8080"]
