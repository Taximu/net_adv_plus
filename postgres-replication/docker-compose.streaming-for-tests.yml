# Streaming replication stack for integration tests (Bitnami PostgreSQL).
# Compose project name is fixed so this file is never merged accidentally with
# docker-compose-postgres-replication.yml (merging would bind-mount all of ./init-scripts
# and run 00-pg_hba-replication.sh, which is for the official postgres image only).
# Ports: primary 5432, replicas 5434 / 5435.
#
# Start:  docker compose -f docker-compose.streaming-for-tests.yml up -d
# Wait:   until healthchecks pass (~30–60s first boot)
# Stop:   docker compose -f docker-compose.streaming-for-tests.yml down -v
#
# Stop any other service bound to 5432/5434/5435 before starting.

name: postgres-streaming-for-tests

services:
  postgres-primary:
    image: docker.io/bitnamilegacy/postgresql:15.10.0-debian-12-r2
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: ReplicaPass123
      POSTGRESQL_USERNAME: job_admin
      POSTGRESQL_PASSWORD: StrongTestPass123
      POSTGRESQL_DATABASE: job_config_db
    ports:
      - "5432:5432"
    volumes:
      - streaming_primary_data:/bitnami/postgresql
      - ./init-scripts/01-init-replication-user.sql:/docker-entrypoint-initdb.d/01-init-replication-user.sql:ro
      - ./init-scripts/02-schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
      - ./init-scripts/03-seed-data.sql:/docker-entrypoint-initdb.d/03-seed-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_admin -d job_config_db -h 127.0.0.1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - streaming-test-net

  postgres-replica1:
    image: docker.io/bitnamilegacy/postgresql:15.10.0-debian-12-r2
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: ReplicaPass123
      POSTGRESQL_MASTER_HOST: postgres-primary
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_USERNAME: job_admin
      POSTGRESQL_PASSWORD: StrongTestPass123
      POSTGRESQL_DATABASE: job_config_db
    ports:
      - "5434:5432"
    depends_on:
      postgres-primary:
        condition: service_healthy
    volumes:
      - streaming_replica1_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_admin -d job_config_db -h 127.0.0.1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks:
      - streaming-test-net

  postgres-replica2:
    image: docker.io/bitnamilegacy/postgresql:15.10.0-debian-12-r2
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: ReplicaPass123
      POSTGRESQL_MASTER_HOST: postgres-primary
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_USERNAME: job_admin
      POSTGRESQL_PASSWORD: StrongTestPass123
      POSTGRESQL_DATABASE: job_config_db
    ports:
      - "5435:5432"
    depends_on:
      postgres-primary:
        condition: service_healthy
    volumes:
      - streaming_replica2_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_admin -d job_config_db -h 127.0.0.1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks:
      - streaming-test-net

networks:
  streaming-test-net:
    driver: bridge

volumes:
  streaming_primary_data:
  streaming_replica1_data:
  streaming_replica2_data:
